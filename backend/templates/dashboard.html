<!DOCTYPE html>
<html>
<head>
    <title>OCML-DI Clinician Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; background: #f9f9f9; }
        h1 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 1em; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #34495e; color: white; }
        tr:nth-child(even) { background: #f2f2f2; }
        .critical { color: red; font-weight: bold; }
        .moderate { color: orange; }
        .low { color: green; }
        .actions { display: flex; gap: 10px; }
        button { padding: 6px 12px; border: none; cursor: pointer; }
        .approve { background: #27ae60; color: white; }
        .reject { background: #c0392b; color: white; }
    </style>
</head>
<body>
    <h1>Flagged Cases for Review</h1>
    <table>
        <tr>
            <th>Patient</th>
            <th>Drug</th>
            <th>Risk Level</th>
            <th>Risk Score</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        {% for r in reviews %}
        <tr>
            <td>
    <a href="/clinician/patient/{{ r.patient_id }}">{{ r.patient_name }}</a>
</td>

            <td>{{ r.proposed_drug }}</td>
            <td class="{{ r.risk_level|lower }}">{{ r.risk_level }}</td>
            <td>{{ r.risk_score }}/10</td>
            <td>{{ r.status }}</td>
            <td class="actions">
                <form method="post" action="/clinician/review/{{ r.id }}/approve">
                    <button class="approve">Approve</button>
                </form>
                <form method="post" action="/clinician/review/{{ r.id }}/reject">
                    <button class="reject">Reject</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
